name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Run tests
        run: uv run pytest -q
      - name: CLI smoke test
        run: uv run system-mapper inventory . --json >/tmp/system-mapper-inventory.json
